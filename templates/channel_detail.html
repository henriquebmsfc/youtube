<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ channel.name }} — YT Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d;
      --text:#e6edf3; --muted:#8b949e; --accent:#f78166;
      --green:#3fb950; --yellow:#d29922; --red:#da3633; --blue:#388bfd; --purple:#bc8cff;
    }
    * { box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    .app-header { background:var(--surface); border-bottom:1px solid var(--border); padding:.875rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .brand { display:flex; align-items:center; gap:.75rem; }
    .brand-icon { width:34px; height:34px; background:#c00; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .brand-name { font-size:1rem; font-weight:700; }
    .brand-sub  { font-size:.7rem; color:var(--muted); }
    .app-nav { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1.5rem; display:flex; }
    .nav-tab { display:inline-flex; align-items:center; gap:.4rem; padding:.65rem 1.1rem; font-size:.85rem; font-weight:500; color:var(--muted); text-decoration:none; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; }
    .nav-tab:hover { color:var(--text); }
    .nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* ── Channel hero ── */
    .channel-hero { background:var(--surface); border-bottom:1px solid var(--border); padding:1.25rem 1.5rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .hero-flag { font-size:2.5rem; }
    .hero-name { font-size:1.3rem; font-weight:700; }
    .hero-meta { font-size:.8rem; color:var(--muted); margin-top:.15rem; }

    /* ── Production card ── */
    .prod-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:1rem; }
    .prod-thumb { width:120px; height:68px; object-fit:cover; border-radius:6px; flex-shrink:0; background:#1a2233; }
    .prod-header { padding:.875rem 1rem; display:flex; gap:.875rem; align-items:flex-start; border-bottom:1px solid var(--border); }
    .prod-title { font-size:.92rem; font-weight:600; line-height:1.3; }
    .prod-source { font-size:.75rem; color:var(--muted); margin-top:.2rem; }
    .prod-body { padding:.75rem 1rem; }

    /* ── Task buttons ── */
    .task-bar { display:flex; gap:.5rem; flex-wrap:wrap; }
    .task-btn {
      display:inline-flex; align-items:center; gap:.35rem;
      padding:.38rem .75rem; border-radius:8px; font-size:.78rem; font-weight:600;
      cursor:pointer; border:1px solid; transition:all .15s;
    }
    .task-btn.pending     { background:rgba(139,148,158,.08); border-color:var(--border);           color:var(--muted);   }
    .task-btn.in_progress { background:rgba(210,153,34,.1);   border-color:rgba(210,153,34,.4);     color:var(--yellow);  }
    .task-btn.done        { background:rgba(63,185,80,.1);    border-color:rgba(63,185,80,.4);      color:var(--green);   }
    .task-btn:hover       { filter:brightness(1.15); transform:translateY(-1px); }

    /* ── Side panel (shared by script/audio/transcription/prompts/thumbnails) ── */
    .side-panel {
      position:fixed; top:0; right:0; height:100vh; width:min(660px,96vw);
      background:var(--surface); border-left:1px solid var(--border);
      z-index:1050; display:flex; flex-direction:column;
      transform:translateX(100%); transition:transform .3s ease;
    }
    .side-panel.open { transform:translateX(0); }
    .panel-header { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .panel-body   { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:.875rem; }
    .panel-footer { padding:.875rem 1.25rem; border-top:1px solid var(--border); display:flex; gap:.5rem; flex-wrap:wrap; flex-shrink:0; }
    .panel-ta { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:.875rem; font-size:.83rem; font-family:'Courier New',monospace; line-height:1.6; width:100%; resize:vertical; min-height:320px; outline:none; }
    .panel-ta:focus { border-color:var(--blue); }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1040; display:none; }

    /* ── Forms in panel ── */
    .form-row  { display:flex; flex-direction:column; gap:.3rem; }
    .form-row label { font-size:.78rem; color:var(--muted); }
    .form-dark { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:.45rem .875rem; font-size:.85rem; width:100%; outline:none; transition:border-color .15s; }
    .form-dark:focus { border-color:var(--blue); }
    .form-dark option { background:var(--surface); }
    label.form-label { font-size:.8rem; color:var(--muted); margin-bottom:.3rem; }

    /* ── Buttons ── */
    .btn-accent  { background:var(--accent); border:none; color:#fff; padding:.5rem 1.1rem; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; transition:opacity .15s; }
    .btn-accent:hover    { opacity:.85; }
    .btn-accent:disabled { opacity:.4; cursor:not-allowed; }
    .btn-green  { background:rgba(63,185,80,.15); border:1px solid rgba(63,185,80,.4); color:var(--green); padding:.5rem 1.1rem; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; transition:all .15s; }
    .btn-green:hover    { background:rgba(63,185,80,.25); }
    .btn-green:disabled { opacity:.4; cursor:not-allowed; }
    .btn-blue   { background:rgba(56,139,253,.15); border:1px solid rgba(56,139,253,.4); color:var(--blue); padding:.5rem 1.1rem; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; transition:all .15s; }
    .btn-blue:hover    { background:rgba(56,139,253,.25); }
    .btn-blue:disabled { opacity:.4; cursor:not-allowed; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); padding:.4rem .9rem; border-radius:8px; font-size:.82rem; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; transition:all .15s; }
    .btn-outline:hover { border-color:var(--blue); color:var(--blue); }
    .btn-danger  { background:rgba(218,54,51,.12); border:1px solid rgba(218,54,51,.3); color:var(--red); padding:.3rem .7rem; border-radius:8px; font-size:.75rem; cursor:pointer; transition:all .15s; }
    .btn-danger:hover { background:rgba(218,54,51,.25); }

    /* ── Audio player ── */
    .audio-player-wrap { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:1rem; }
    audio { width:100%; height:36px; }
    audio::-webkit-media-controls-panel { background:var(--bg); }

    /* ── Voice card ── */
    .voice-select-wrap { position:relative; }
    #voiceSearch { padding-right:2.2rem; }
    .voice-clear { position:absolute; right:.6rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:.9rem; }

    /* ── Thumbnail grid ── */
    .thumb-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-top:.5rem; }
    .thumb-item { position:relative; border-radius:8px; overflow:hidden; aspect-ratio:16/9; background:#1a2233; border:1px solid var(--border); }
    .thumb-item img { width:100%; height:100%; object-fit:cover; }
    .thumb-item .thumb-dl {
      position:absolute; bottom:.4rem; right:.4rem; background:rgba(0,0,0,.7);
      border:none; border-radius:6px; color:#fff; padding:.25rem .5rem;
      font-size:.72rem; cursor:pointer; display:flex; align-items:center; gap:.25rem;
    }
    .thumb-item .thumb-dl:hover { background:rgba(0,0,0,.9); }
    .thumb-concept { font-size:.7rem; color:var(--muted); margin-top:.3rem; line-height:1.3; }

    /* ── Progress bar ── */
    .progress-bar-wrap { background:var(--border); border-radius:4px; height:6px; overflow:hidden; }
    .progress-bar-fill { background:var(--accent); height:6px; border-radius:4px; transition:width .4s; }

    /* ── Misc ── */
    #toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.875rem 1.25rem; font-size:.85rem; min-width:260px; box-shadow:0 8px 24px rgba(0,0,0,.5); display:none; }
    .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .empty-state .ei { font-size:3rem; margin-bottom:.75rem; }
    a { text-decoration:none; color:inherit; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinning { animation:spin .75s linear infinite; display:inline-block; }
    .info-row { display:flex; align-items:center; gap:.5rem; font-size:.82rem; color:var(--muted); margin-bottom:.35rem; }
    .info-row strong { color:var(--text); }
    .slider-row { display:flex; align-items:center; gap:.75rem; }
    .slider-row input[type=range] { flex:1; accent-color:var(--accent); }
    .slider-val { font-size:.8rem; color:var(--muted); min-width:2.5rem; text-align:right; }
    .section-sep { border-top:1px solid var(--border); margin:1rem 0; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-icon">▶</div>
    <div><div class="brand-name">YT Analyzer</div><div class="brand-sub">Idade Medieval &nbsp;·&nbsp; EN → PT</div></div>
  </div>
  <a href="/channels" class="btn-outline"><i class="bi bi-arrow-left"></i> Todos os Canais</a>
</header>

<nav class="app-nav">
  <a href="/" class="nav-tab"><i class="bi bi-bar-chart-line"></i> Analisador</a>
  <a href="/transcriber" class="nav-tab"><i class="bi bi-mic"></i> Transcritor</a>
  <a href="/channels" class="nav-tab active"><i class="bi bi-tv"></i> Produção</a>
</nav>

<!-- Channel hero -->
<div class="channel-hero">
  <div class="hero-flag">{{ channel.flag or '📺' }}</div>
  <div style="flex:1">
    <div class="hero-name">{{ channel.name }}</div>
    <div class="hero-meta">{{ channel.description or '' }}</div>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center">
    <span id="prodCount" style="font-size:.82rem;color:var(--muted)"></span>
    <button class="btn-accent" onclick="openAddUrl()">
      <i class="bi bi-link-45deg"></i> Adicionar por URL
    </button>
  </div>
</div>

<main style="padding:1.5rem;max-width:1100px;margin:0 auto">
  <div id="prodList">
    <div class="empty-state"><div class="ei">⏳</div><div>Carregando…</div></div>
  </div>
</main>

<div id="toast"></div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!--  Side panel — shared by script / audio / transcription / prompts / thumbs -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div>
      <div style="font-weight:700;font-size:1rem" id="panelTitle">Painel</div>
      <div style="font-size:.75rem;color:var(--muted)" id="panelSub"></div>
    </div>
    <button class="btn-outline" onclick="closePanel()"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer" id="panelFooter"></div>
</div>

<!-- ── Modal: Task manual (video / posting) ── -->
<div class="modal fade modal-dark" id="modalTask" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">
      <div class="modal-header" style="border-color:var(--border)">
        <h6 class="modal-title" id="modalTaskTitle">Tarefa</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1)"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select id="taskStatus" class="form-dark">
            <option value="pending">⬜ Pendente</option>
            <option value="in_progress">🟡 Em andamento</option>
            <option value="done">✅ Concluído</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Notas / link de arquivo</label>
          <textarea id="taskNotes" class="form-dark" rows="3" placeholder="Links, observações, nome do arquivo…"></textarea>
        </div>
      </div>
      <div class="modal-footer" style="border-color:var(--border)">
        <button class="btn-outline" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn-accent" onclick="saveTask()"><i class="bi bi-check-lg"></i> Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: Adicionar por URL ── -->
<div class="modal fade" id="modalAddUrl" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">
      <div class="modal-header" style="border-color:var(--border)">
        <h6 class="modal-title">🔗 Adicionar Vídeo por URL</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1)"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 mb-2">
          <input id="url-input" type="text" class="form-dark" placeholder="https://youtube.com/watch?v=...">
          <button class="btn-accent" onclick="verifyUrl()" id="verifyBtn" style="white-space:nowrap">
            <i class="bi bi-search"></i> Verificar
          </button>
        </div>
        <div id="verifyResult" style="display:none"></div>
        <div id="addForm" style="display:none;margin-top:1rem">
          <div class="mb-3">
            <label class="form-label">Título adaptado</label>
            <input id="adapted-title" type="text" class="form-dark">
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-color:var(--border)">
        <button class="btn-outline" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn-accent" id="addToChannelBtn" style="display:none" onclick="addToChannel()">
          <i class="bi bi-plus-lg"></i> Adicionar à Produção
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const CHANNEL_ID       = {{ channel.id }};
  const CHANNEL_LANG     = "{{ channel.language_code }}";
  const DEFAULT_VOICE_ID = "{{ config.DEFAULT_VOICE_ID }}";

  const TASK_META = {
    script:        { icon:'📝', label:'Roteiro',     action:'panel' },
    audio:         { icon:'🎙️', label:'Áudio',        action:'panel' },
    transcription: { icon:'📄', label:'Transcrição',  action:'panel' },
    prompts:       { icon:'🎨', label:'Prompts',      action:'panel' },
    thumbnails:    { icon:'🖼️', label:'Thumbnails',   action:'panel' },
    video:         { icon:'🎬', label:'Vídeo',        action:'modal' },
    posting:       { icon:'📤', label:'Postagem',     action:'modal' },
  };

  let productions   = [];
  let panelProdId   = null;
  let panelMode     = null;   // 'script' | 'audio' | 'transcription' | 'prompts' | 'thumbnails'
  let activeTask    = null;
  let verifiedVideo = null;
  let _audioPollTimer   = null;
  let _thumbPollTimer   = null;
  let _transPollTimer   = null;

  // ── Load ─────────────────────────────────────────────────────────────────
  async function loadProductions() {
    const data = await fetch(`/api/productions?channel_id=${CHANNEL_ID}`).then(r => r.json());
    productions = Array.isArray(data) ? data : [];
    document.getElementById('prodCount').textContent =
      productions.length ? `${productions.length} vídeo(s)` : '';
    renderProductions();
  }

  function renderProductions() {
    const list = document.getElementById('prodList');
    if (!productions.length) {
      list.innerHTML = `<div class="empty-state"><div class="ei">🎬</div>
        <div>Nenhum vídeo em produção ainda</div>
        <div style="margin-top:.5rem;font-size:.85rem">Clique em <strong>Adicionar por URL</strong> ou use o botão nos cards do Analisador</div>
      </div>`;
      return;
    }
    list.innerHTML = productions.map(p => {
      const tasks    = p.tasks || {};
      const taskKeys = Object.keys(TASK_META);
      const doneCount = taskKeys.filter(k => tasks[k]?.status === 'done').length;
      const taskBtns  = taskKeys.map(k => {
        const m = TASK_META[k];
        const t = tasks[k] || { status:'pending' };
        return `<button class="task-btn ${t.status}"
                  onclick="openTask(${p.id},'${k}')"
                  title="${t.notes ? esc(t.notes) : m.label}">
                  ${m.icon} ${m.label}
                  ${t.status==='done' ? '<i class="bi bi-check-lg"></i>' : ''}
                  ${t.status==='in_progress' ? '<i class="bi bi-hourglass-split spinning"></i>' : ''}
                </button>`;
      }).join('');
      const pct = Math.round(doneCount / taskKeys.length * 100);
      return `
        <div class="prod-card" id="prod-${p.id}">
          <div class="prod-header">
            ${p.source_thumbnail
              ? `<img src="${esc(p.source_thumbnail)}" class="prod-thumb" onerror="this.style.display='none'">`
              : '<div class="prod-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--muted)"><i class="bi bi-camera-video" style="font-size:1.5rem"></i></div>'}
            <div style="flex:1;min-width:0">
              <div class="prod-title">${esc(p.adapted_title || p.source_title)}</div>
              ${p.adapted_title && p.source_title !== p.adapted_title
                ? `<div class="prod-source">🔗 ${esc(p.source_title)}</div>` : ''}
              <div class="prod-source"><i class="bi bi-person-circle"></i> ${esc(p.source_channel)}
                &nbsp;·&nbsp; <a href="${esc(p.source_url)}" target="_blank" style="color:var(--blue)">Ver original <i class="bi bi-box-arrow-up-right"></i></a>
              </div>
              <div style="margin-top:.5rem">
                <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:.2rem">
                  <span>Progresso</span><span>${doneCount}/${taskKeys.length} tarefas</span>
                </div>
                <div class="progress-bar-wrap">
                  <div class="progress-bar-fill" style="width:${pct}%"></div>
                </div>
              </div>
            </div>
            <button class="btn-danger" onclick="deleteProd(${p.id})" title="Remover vídeo">
              <i class="bi bi-trash3"></i>
            </button>
          </div>
          <div class="prod-body">
            <div class="task-bar">${taskBtns}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Task dispatcher ───────────────────────────────────────────────────────
  function openTask(prodId, taskType) {
    const m = TASK_META[taskType];
    if (m.action === 'modal') {
      openTaskModal(prodId, taskType);
    } else {
      openPanel(prodId, taskType);
    }
  }

  // ── Generic side panel ────────────────────────────────────────────────────
  function openPanel(prodId, mode) {
    const prod = productions.find(p => p.id === prodId);
    if (!prod) return;
    panelProdId = prodId;
    panelMode   = mode;

    const m = TASK_META[mode];
    document.getElementById('panelTitle').textContent =
      `${m.icon} ${m.label}`;
    document.getElementById('panelSub').textContent =
      (prod.adapted_title || prod.source_title || '').slice(0, 70);

    if (mode === 'script')        renderScriptPanel(prod);
    else if (mode === 'audio')    renderAudioPanel(prod);
    else if (mode === 'transcription') renderTranscriptionPanel(prod);
    else if (mode === 'prompts')  renderPromptsPanel(prod);
    else if (mode === 'thumbnails') renderThumbnailsPanel(prod);

    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('overlay').style.display = 'block';
  }

  function closePanel() {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').style.display = 'none';
    clearInterval(_audioPollTimer);
    clearInterval(_thumbPollTimer);
    clearInterval(_transPollTimer);
    _stopPoll();   // stop script/prompts background poll (task keeps running on server)
    panelProdId = panelMode = null;
  }

  // ══════════════════════════════════════════════════════
  // BACKGROUND POLLING HELPER
  // ══════════════════════════════════════════════════════
  let _bgPoll = null;  // active setInterval handle

  function _stopPoll() {
    if (_bgPoll) { clearInterval(_bgPoll); _bgPoll = null; }
  }

  // Poll every 3 s by reloading the production from DB.
  // When the task status is no longer 'in_progress', calls onDone(prod) or onError(msg).
  function _startPoll(prodId, taskType, onDone, onError) {
    _stopPoll();
    _bgPoll = setInterval(async () => {
      await loadProductions();
      const prod = productions.find(p => p.id === prodId);
      if (!prod) return;
      const task = (prod.tasks || {})[taskType] || {};
      if (task.status === 'done') {
        _stopPoll();
        onDone(prod, task);
      } else if (task.status === 'pending' && task.notes && task.notes.startsWith('Erro')) {
        _stopPoll();
        onError(task.notes.replace(/^Erro:\s*/, ''));
      }
      // status === 'in_progress' → keep polling
    }, 3000);
  }

  function _bgSpinner(color, icon, title, subtitle) {
    return `<div style="text-align:center;padding:3rem;color:var(--muted)">
      <i class="bi bi-${icon} spinning" style="font-size:2.5rem;color:${color}"></i>
      <div style="margin-top:1rem;font-weight:600;color:var(--text)">${title}</div>
      <div style="font-size:.8rem;margin-top:.4rem">${subtitle}</div>
      <div style="margin-top:1.25rem;font-size:.78rem;color:var(--muted);
                  background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.2);
                  border-radius:8px;padding:.5rem .9rem;display:inline-block">
        <i class="bi bi-arrow-left-right"></i>
        Executando em segundo plano — você pode navegar para outras telas
      </div>
    </div>`;

  function _errHtml(msg) {
    return `<div style="color:var(--red);padding:1rem;background:rgba(218,54,51,.08);border-radius:8px">
      <i class="bi bi-exclamation-triangle-fill"></i> ${esc(msg||'Erro desconhecido')}

  // ══════════════════════════════════════════════════════
  // SCRIPT PANEL
  // ══════════════════════════════════════════════════════
  function renderScriptPanel(prod) {
    _stopPoll();
    const task = (prod.tasks || {}).script || {};
    const body = document.getElementById('panelBody');
    const foot = document.getElementById('panelFooter');

    // ── Generating in background ──
    if (task.status === 'in_progress') {
      body.innerHTML = _bgSpinner('var(--accent)', 'stars', 'Claude está escrevendo o roteiro…', 'Isso pode levar 20–60 segundos');
      foot.innerHTML = `<button class="btn-outline" onclick="closePanel()"><i class="bi bi-x"></i> Fechar painel</button>`;
      _startPoll(prod.id, 'script',
        (updatedProd, task) => {
          const styleLabel = task.notes ? ` — ${task.notes.split('|')[0].trim()}` : '';
          showToast(`✅ Roteiro pronto${styleLabel}!`, false);
          renderScriptPanel(updatedProd);
        },
        (msg) => {
          document.getElementById('panelBody').innerHTML = _errHtml(msg);
          document.getElementById('panelFooter').innerHTML =
            `<button class="btn-accent" id="genScriptBtn" onclick="generateScript()">
               <i class="bi bi-stars"></i> Tentar novamente
             </button>`;
        }
      );
      return;
    }

    // ── Style badge ──
    const styleBadge = task.notes
      ? `<span style="display:inline-block;margin-bottom:.75rem;padding:.2rem .6rem;border-radius:20px;
                      font-size:.72rem;font-weight:600;background:rgba(188,140,255,.15);color:var(--purple);
                      border:1px solid rgba(188,140,255,.3)">
           🎭 ${esc(task.notes)}
         </span><br>`
      : '';

    if (task.result_text) {
      body.innerHTML = styleBadge + `<textarea id="scriptArea" class="panel-ta">${esc(task.result_text)}</textarea>`;
    } else {
      body.innerHTML = `<div class="empty-state"><div class="ei">📝</div>
        <div>Nenhum roteiro gerado ainda</div>
        <div style="margin-top:.5rem;font-size:.85rem;color:var(--muted)">
          Clique em <strong>Gerar com IA</strong> — 1 de 4 estilos será escolhido aleatoriamente
        </div>
      </div>`;
    }
    foot.innerHTML = `
      <button class="btn-accent" id="genScriptBtn" onclick="generateScript()">
        <i class="bi bi-stars"></i> ${task.result_text ? 'Regerar com IA (novo estilo)' : 'Gerar com IA'}
      </button>
      ${task.result_text ? `
        <button class="btn-outline" onclick="copyPanelText('scriptArea')"><i class="bi bi-clipboard"></i> Copiar</button>
        <button class="btn-outline" onclick="savePanelText('scriptArea','roteiro')"><i class="bi bi-download"></i> TXT</button>
      ` : ''}
    `;
  }

  async function generateScript() {
    const btn = document.getElementById('genScriptBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-stars spinning"></i> Iniciando…'; }
    try {
      const res = await fetch(`/api/productions/${panelProdId}/tasks/script/generate`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }).then(r => r.json());
      if (res.queued) {
        await loadProductions();
        const prod = productions.find(p => p.id === panelProdId);
        if (prod) renderScriptPanel(prod);   // will see in_progress → show spinner + start poll
      } else {
        document.getElementById('panelBody').innerHTML = _errHtml(res.error);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-stars"></i> Tentar novamente'; }
      }
    } catch(e) { showToast('❌ Erro de conexão', true); if (btn) btn.disabled = false; }
  }

  // ══════════════════════════════════════════════════════
  // AUDIO PANEL
  // ══════════════════════════════════════════════════════
  function renderAudioPanel(prod) {
    const task = (prod.tasks || {}).audio || {};
    const body = document.getElementById('panelBody');
    const foot = document.getElementById('panelFooter');

    // If already done — show player
    if (task.status === 'done' && task.result_text) {
      let audioUrl = '';
      try { audioUrl = JSON.parse(task.result_text).audio_url || ''; } catch(e){}
      body.innerHTML = `
        <div class="audio-player-wrap">
          <div class="info-row"><i class="bi bi-check-circle-fill" style="color:var(--green)"></i> <strong>Áudio gerado com sucesso</strong></div>
          <audio controls src="${esc(audioUrl)}"></audio>
          <div style="margin-top:.5rem;display:flex;gap:.5rem">
            <a href="${esc(audioUrl)}" download class="btn-outline" style="font-size:.78rem">
              <i class="bi bi-download"></i> Baixar MP3
            </a>
          </div>
        </div>
        <div class="section-sep"></div>
        ${renderVoiceSelector()}`;
      foot.innerHTML = `
        <button class="btn-accent" id="genAudioBtn" onclick="generateAudio()">
          <i class="bi bi-arrow-repeat"></i> Regerar Áudio
        </button>`;
    } else if (task.status === 'in_progress') {
      // Try to resume polling
      let taskId = '';

      body.innerHTML = `
        <div style="text-align:center;padding:3rem;color:var(--muted)">
          <i class="bi bi-hourglass-split spinning" style="font-size:2.5rem;color:var(--yellow)"></i>

    } else {
      body.innerHTML = renderVoiceSelector();
      foot.innerHTML = `
        <button class="btn-accent" id="genAudioBtn" onclick="generateAudio()">
          <i class="bi bi-mic-fill"></i> Gerar Áudio
        </button>`;
    }
  }

  async function generateAudio() {
    const voiceId = 'TumdjBNWanlT3ysvclWh'; // Peter (fixo)
    const btn = document.getElementById('genAudioBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split spinning"></i> Enviando…'; }

    try {
      const res = await fetch(`/api/productions/${panelProdId}/tasks/audio/generate`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          voice_id:   voiceId,
          model_id:   document.getElementById('modelSelect')?.value  || 'eleven_turbo_v2_5',
          speed:      parseFloat(document.getElementById('speedSlider')?.value || 0.9),
          stability:  parseFloat(document.getElementById('stabSlider')?.value || 0.5),
          similarity: parseFloat(document.getElementById('simSlider')?.value  || 0.75),
        }),
      }).then(r => r.json());

      if (res.success) {
        showToast('🎙️ Gerando áudio… aguarde', false);
        document.getElementById('panelBody').innerHTML = `
          <div style="text-align:center;padding:3rem;color:var(--muted)">
            <i class="bi bi-hourglass-split spinning" style="font-size:2.5rem;color:var(--yellow)"></i>
            <div style="margin-top:1rem;font-weight:600">Gerando áudio com ElevenLabs…</div>
            <div style="font-size:.8rem;margin-top:.4rem">Isso pode levar 1–3 minutos dependendo do tamanho do roteiro</div>
            <div style="margin-top:1.5rem" id="audioPollInfo" style="font-size:.78rem;color:var(--muted)"></div>
          </div>`;
        document.getElementById('panelFooter').innerHTML = '';
        startAudioPolling(panelProdId, res.task_id);
        await loadProductions();
      } else {
        // Mostra erro detalhado da API para facilitar debug
        const detail = res.detail ? JSON.stringify(res.detail) : '';
        const msg = (res.error || 'Erro ao gerar áudio') + (detail ? ': ' + detail : '');
        console.error('[Audio] Erro API:', res);
        document.getElementById('panelBody').innerHTML = `
          <div style="color:var(--red);padding:1rem;background:rgba(218,54,51,.08);border-radius:8px;font-size:.82rem">
            <i class="bi bi-exclamation-triangle-fill"></i> <strong>Erro da API:</strong><br>
            <code style="word-break:break-all">${esc(msg)}</code>
          </div>`;
        document.getElementById('panelFooter').innerHTML = `
          <button class="btn-accent" id="genAudioBtn" onclick="generateAudio()">
            <i class="bi bi-arrow-repeat"></i> Tentar novamente
          </button>`;
      }
    } catch(e) {
      showToast('❌ Erro de conexão: ' + e.message, true);
      if (btn) { btn.disabled = false; }
    }
  }

  function startAudioPolling(prodId, taskId) {
    clearInterval(_audioPollTimer);
    _audioPollTimer = setInterval(async () => {
      try {
        const data = await fetch(`/api/productions/${prodId}/tasks/audio/status/${taskId}`)
          .then(r => r.json());
        const info = document.getElementById('audioPollInfo');
        if (info) info.textContent = `Status: ${data.status || '…'}`;
        if (data.status === 'completed' || data.status === 'done') {
          clearInterval(_audioPollTimer);
          showToast('✅ Áudio gerado com sucesso!', false);
          await loadProductions();
          if (panelProdId === prodId && panelMode === 'audio') {
            const prod = productions.find(p => p.id === prodId);
            if (prod) renderAudioPanel(prod);
          }
        } else if (data.status === 'failed' || data.error) {
          clearInterval(_audioPollTimer);
          showToast('❌ Falha na geração do áudio: ' + (data.error || data.status), true);
        }
      } catch(e) {}
    }, 4000);
  }

  // TRANSCRIPTION PANEL
  // ══════════════════════════════════════════════════════
  function renderTranscriptionPanel(prod) {

      autoBtn = `<button class="btn-green" id="autoTransBtn" onclick="autoTranscribe()">

  async function autoTranscribe() {
    const btn = document.getElementById('autoTransBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split spinning"></i> Baixando e transcrevendo…'; }

    try {
      const res = await fetch(`/api/productions/${panelProdId}/tasks/transcription/auto`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }).then(r => r.json());

      if (res.success) {
        showToast('🎙️ Transcrevendo com Whisper… aguarde', false);
        document.getElementById('panelBody').innerHTML = `
          <div style="text-align:center;padding:3rem;color:var(--muted)">
            <i class="bi bi-robot spinning" style="font-size:2.5rem;color:var(--green)"></i>
            <div style="margin-top:1rem;font-weight:600">Whisper transcrevendo o áudio…</div>
            <div style="font-size:.8rem;margin-top:.4rem">Divide em blocos de 8 segundos para o Veo3 Flow</div>
            <div id="transPollInfo" style="margin-top:1rem;font-size:.78rem;color:var(--muted)"></div>
          </div>`;
        startTransPolling(panelProdId, res.job_id);
      } else {
        showToast('❌ ' + (res.error || 'Erro'), true);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-robot"></i> Auto-transcrever'; }
      }
    } catch(e) { showToast('❌ Erro', true); }
  }

  function startTransPolling(prodId, jobId) {
    clearInterval(_transPollTimer);
    _transPollTimer = setInterval(async () => {
      try {
        const data = await fetch(`/api/transcribe/status/${jobId}`).then(r => r.json());
        const info = document.getElementById('transPollInfo');
        if (info) info.textContent = data.progress || data.status || '…';
        if (data.status === 'done') {
          clearInterval(_transPollTimer);
          showToast('✅ Transcrição concluída!', false);
          await loadProductions();
          if (panelProdId === prodId && panelMode === 'transcription') {
            const prod = productions.find(p => p.id === prodId);
            if (prod) renderTranscriptionPanel(prod);
          }
        } else if (data.status === 'error') {
          clearInterval(_transPollTimer);
          showToast('❌ Erro na transcrição: ' + (data.error || ''), true);
        }
      } catch(e) {}
    }, 3000);
  }

  // ══════════════════════════════════════════════════════
  // PROMPTS PANEL (DOTTI Veo3 Agent)
  // ══════════════════════════════════════════════════════
  function renderPromptsPanel(prod) {
    _stopPoll();
    const tasks      = prod.tasks || {};
    const promptTask = tasks.prompts || {};
    const scriptTask = tasks.script  || {};
    const body = document.getElementById('panelBody');
    const foot = document.getElementById('panelFooter');

    const hasScript = !!scriptTask.result_text;
    const hasTrans  = !!(tasks.transcription || {}).result_text;

    // ── Generating in background ──
    if (promptTask.status === 'in_progress') {
      body.innerHTML = _bgSpinner('var(--purple)', 'stars', 'DOTTI Agent gerando prompts Veo3…', 'Analisando personagens e sincronizando cenas<br>Isso pode levar 30–90 segundos');
      foot.innerHTML = `<button class="btn-outline" onclick="closePanel()"><i class="bi bi-x"></i> Fechar painel</button>`;
      _startPoll(prod.id, 'prompts',
        (updatedProd) => {
          showToast('✅ Prompts Veo3 prontos!', false);
          renderPromptsPanel(updatedProd);
        },
        (msg) => {
          document.getElementById('panelBody').innerHTML = _errHtml(msg);
          document.getElementById('panelFooter').innerHTML =
            `<button class="btn-accent" id="genPromptsBtn" onclick="generatePrompts()">
               <i class="bi bi-stars"></i> Tentar novamente
             </button>`;
        }
      );

    }

    let topHtml = `

      </div>
      <div class="info-row">
        <i class="bi bi-${hasTrans ? 'check-circle-fill' : 'dash-circle'}"
           style="color:var(--${hasTrans ? 'green' : 'muted'})"></i>

    if (promptTask.result_text) {

        ${topHtml}

        <div style="font-size:.78rem;color:var(--muted);margin-bottom:.4rem">Prompts Veo3 gerados pelo agente DOTTI</div>
        <textarea id="promptsArea" class="panel-ta" style="min-height:400px">${esc(promptTask.result_text)}</textarea>`;
      foot.innerHTML = `
        <button class="btn-accent" id="genPromptsBtn" onclick="generatePrompts()" ${!hasScript ? 'disabled' : ''}>
          <i class="bi bi-arrow-repeat"></i> Regerar Prompts
        </button>

          <i class="bi bi-stars"></i> Gerar Prompts Veo3
        </button>`;

    const btn = document.getElementById('genPromptsBtn');

      const res = await fetch(`/api/productions/${panelProdId}/tasks/prompts/generate`,

  // ══════════════════════════════════════════════════════
  // THUMBNAILS PANEL  (DALL-E 3)
  // ══════════════════════════════════════════════════════
  function renderThumbnailsPanel(prod) {
    clearInterval(_thumbPollTimer);
    const tasks     = prod.tasks || {};
    const thumbTask = tasks.thumbnails || {};
    const body = document.getElementById('panelBody');
    const foot = document.getElementById('panelFooter');

    // ── Running in background — auto-resume polling ──
    if (thumbTask.status === 'in_progress') {
      _showThumbProgress(0, 4, 'Aguardando progresso…');
      startThumbPolling(prod.id);
      return;
    }

    let existingUrls = [], existingPrompts = [], usedRef = false;
    if (thumbTask.result_text) {
      try {
        const d = JSON.parse(thumbTask.result_text);
        existingUrls    = d.urls     || [];
        existingPrompts = d.prompts  || [];
        usedRef         = !!d.used_ref;
      } catch(e){}
    }

    if (existingUrls.length) {
      const grid = existingUrls.map((url, i) => {
        const label = usedRef
          ? (i < 2
              ? `<div style="font-size:.68rem;font-weight:600;color:var(--blue);margin-bottom:.3rem">
                   <i class="bi bi-camera-video"></i> Inspirado no original
                 </div>`
              : `<div style="font-size:.68rem;font-weight:600;color:var(--purple);margin-bottom:.3rem">
                   <i class="bi bi-stars"></i> Conceito original
                 </div>`)
          : '';
        return `<div>
          ${label}
          <div class="thumb-item">
            <img src="${esc(url)}" alt="Thumbnail ${i+1}" loading="lazy"
                 onerror="this.closest('.thumb-item').innerHTML='<div style=\'padding:.5rem;font-size:.75rem;color:var(--muted)\'>⚠️ URL expirada — regenere</div>'">
            <a href="${esc(url)}" target="_blank" class="thumb-dl">
              <i class="bi bi-box-arrow-up-right"></i> Abrir
            </a>
          </div>
          ${existingPrompts[i] ? `<div class="thumb-concept" title="${esc(existingPrompts[i])}">${esc(existingPrompts[i].slice(0,90))}…</div>` : ''}
        </div>`;
      }).join('');
      const refNote = usedRef
        ? `<span style="font-size:.73rem;color:var(--muted);display:block;margin-top:.25rem">
             <i class="bi bi-camera-video" style="color:var(--blue)"></i> 2 inspiradas no original &nbsp;·&nbsp;
             <i class="bi bi-stars" style="color:var(--purple)"></i> 2 conceitos originais
           </span>` : '';
      body.innerHTML = `
        <div class="info-row">
          <i class="bi bi-check-circle-fill" style="color:var(--green)"></i>
          <strong>${existingUrls.length} thumbnails geradas com DALL-E 3</strong>
          ${refNote}
          <div style="font-size:.71rem;color:var(--muted);margin-top:.2rem">⚠️ URLs expiram em ~1h — abra e salve as imagens que quiser usar</div>
        </div>
        <div class="thumb-grid">${grid}</div>`;
      foot.innerHTML = `
        <button class="btn-accent" id="genThumbBtn" onclick="generateThumbnails()">
          <i class="bi bi-arrow-repeat"></i> Regerar com DALL-E 3
        </button>`;
    } else {
      body.innerHTML = `
        <div class="info-row">
          <i class="bi bi-info-circle" style="color:var(--blue)"></i>
          Gera 4 thumbnails com conceitos visuais distintos usando <strong>DALL-E 3 HD</strong>
        </div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem">
          • Formato 1792×1024 (16:9, padrão YouTube)<br>
          • Claude cria os prompts → DALL-E 3 gera as imagens<br>
          • ~30–60 segundos por imagem (4 imagens = ~2–4 min)
        </div>
        <div class="empty-state" style="padding:2rem">
          <div class="ei">🖼️</div>
          <div>Nenhum thumbnail gerado ainda</div>
        </div>`;
      foot.innerHTML = `
        <button class="btn-accent" id="genThumbBtn" onclick="generateThumbnails()">
          <i class="bi bi-image"></i> Gerar 4 Thumbnails (DALL-E 3)
        </button>`;
    }
  }

  async function generateThumbnails() {
    const btn = document.getElementById('genThumbBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split spinning"></i> Iniciando…'; }
    try {
      const res = await fetch(`/api/productions/${panelProdId}/tasks/thumbnails/generate`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }).then(r => r.json());
      if (res.queued) {
        await loadProductions();
        const prod = productions.find(p => p.id === panelProdId);
        if (prod) renderThumbnailsPanel(prod);  // sees in_progress → spinner + poll
      } else {
        showToast('❌ ' + (res.error || 'Erro'), true);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-image"></i> Gerar 4 Thumbnails (DALL-E 3)'; }
      }
    } catch(e) { showToast('❌ Erro de conexão', true); if (btn) btn.disabled = false; }
  }

  function _showThumbProgress(done, total, label) {
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('panelBody').innerHTML = `
      <div style="text-align:center;padding:2.5rem 1.5rem;color:var(--muted)">
        <i class="bi bi-image spinning" style="font-size:2.5rem;color:var(--purple)"></i>
        <div style="margin-top:1rem;font-weight:600;color:var(--text)">Gerando thumbnails com DALL-E 3…</div>
        <div style="font-size:.82rem;margin-top:.3rem">${esc(label)}</div>
        <div style="margin-top:1.25rem;background:var(--border);border-radius:99px;height:6px;overflow:hidden">
          <div id="thumbBar" style="background:var(--purple);height:100%;width:${pct}%;transition:width .5s ease;border-radius:99px"></div>
        </div>
        <div id="thumbCount" style="font-size:.78rem;margin-top:.5rem;color:var(--muted)">${done} / ${total} imagens</div>
        <div style="margin-top:1rem;font-size:.78rem;color:var(--muted);
                    background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.2);
                    border-radius:8px;padding:.5rem .9rem;display:inline-block">
          <i class="bi bi-arrow-left-right"></i>
          Executando em segundo plano — você pode navegar para outras telas
        </div>
      </div>`;
    document.getElementById('panelFooter').innerHTML =
      `<button class="btn-outline" onclick="closePanel()"><i class="bi bi-x"></i> Fechar painel</button>`;
  }

  // Poll by prod_id — no job_id needed, survives navigation
  function startThumbPolling(prodId) {
    clearInterval(_thumbPollTimer);
    _thumbPollTimer = setInterval(async () => {
      try {
        const data = await fetch(`/api/productions/${prodId}/tasks/thumbnails/status`).then(r => r.json());
        const done  = data.done  || 0;
        const total = data.total || 4;
        const phase = data.phase || 'images';
        const label = phase === 'prompts'
          ? 'Claude criando os prompts…'
          : (done === 0 ? 'DALL-E iniciando…' : `Imagem ${done} de ${total} concluída`);

        if (panelProdId === prodId && panelMode === 'thumbnails') {
          if (data.status === 'processing') {
            // Update bar in-place to avoid flicker; re-render if bar not found
            const bar   = document.getElementById('thumbBar');
            const count = document.getElementById('thumbCount');
            if (bar && count) {
              const pct = total > 0 ? Math.round((done / total) * 100) : 0;
              bar.style.width   = pct + '%';
              count.textContent = `${done} / ${total} imagens — ${label}`;
            } else {
              _showThumbProgress(done, total, label);
            }
          } else if (data.status === 'done') {
            clearInterval(_thumbPollTimer);
            showToast(`✅ ${data.urls?.length || total} thumbnails geradas!`, false);
            await loadProductions();
            const prod = productions.find(p => p.id === prodId);
            if (prod) renderThumbnailsPanel(prod);
          } else if (data.status === 'error') {
            clearInterval(_thumbPollTimer);
            document.getElementById('panelBody').innerHTML = _errHtml(data.error);
            document.getElementById('panelFooter').innerHTML =
              `<button class="btn-accent" id="genThumbBtn" onclick="generateThumbnails()">
                 <i class="bi bi-image"></i> Tentar novamente
               </button>`;
          }
        } else {
          // Panel hidden — keep polling silently, toast when done
          if (data.status === 'done') {
            clearInterval(_thumbPollTimer);
            showToast('✅ Thumbnails prontas!', false);
            await loadProductions();
          } else if (data.status === 'error') {
            clearInterval(_thumbPollTimer);
          }
        }
      } catch(e) {}
    }, 4000);
  }

  // ── Task modal (manual: video / posting) ─────────────────────────────────
  function openTaskModal(prodId, taskType) {
    const prod = productions.find(p => p.id === prodId);
    if (!prod) return;
    const task = (prod.tasks || {})[taskType] || {};
    const meta = TASK_META[taskType];
    activeTask = { prod_id: prodId, task_type: taskType };
    document.getElementById('modalTaskTitle').textContent = `${meta.icon} ${meta.label}`;
    document.getElementById('taskStatus').value = task.status || 'pending';
    document.getElementById('taskNotes').value  = task.notes  || '';
    new bootstrap.Modal(document.getElementById('modalTask')).show();
  }

  async function saveTask() {
    if (!activeTask) return;
    const status = document.getElementById('taskStatus').value;
    const notes  = document.getElementById('taskNotes').value.trim();
    await fetch(`/api/productions/${activeTask.prod_id}/tasks/${activeTask.task_type}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status, notes }),
    });
    bootstrap.Modal.getInstance(document.getElementById('modalTask')).hide();
    showToast('✅ Tarefa atualizada!', false);
    loadProductions();
  }

  // ── Delete production ─────────────────────────────────────────────────────
  async function deleteProd(id) {
    if (!confirm('Remover este vídeo da produção?')) return;
    await fetch(`/api/productions/${id}`, { method:'DELETE' });
    showToast('🗑️ Vídeo removido', false);
    loadProductions();
  }

  // ── Add by URL ────────────────────────────────────────────────────────────
  function openAddUrl() {
    document.getElementById('url-input').value = '';
    document.getElementById('verifyResult').style.display = 'none';
    document.getElementById('addForm').style.display = 'none';
    document.getElementById('addToChannelBtn').style.display = 'none';
    verifiedVideo = null;
    new bootstrap.Modal(document.getElementById('modalAddUrl')).show();
  }

  async function verifyUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    const btn = document.getElementById('verifyBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    const res = await fetch('/api/youtube/video-info', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ url }),
    }).then(r => r.json());
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-search"></i> Verificar';
    if (res.error) {
      document.getElementById('verifyResult').style.display = '';
      document.getElementById('verifyResult').innerHTML =
        `<div style="color:var(--red);font-size:.85rem"><i class="bi bi-x-circle"></i> ${esc(res.error)}</div>`;
      return;
    }
    verifiedVideo = res;
    const langOk = !res.language || res.language.startsWith('en');
    const langBadge = langOk
      ? `<span style="color:var(--green)"><i class="bi bi-check-circle-fill"></i> Inglês (OK)</span>`
      : `<span style="color:var(--yellow)"><i class="bi bi-exclamation-triangle-fill"></i> Idioma: ${esc(res.language)}</span>`;
    document.getElementById('verifyResult').style.display = '';
    document.getElementById('verifyResult').innerHTML = `
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;gap:.75rem;align-items:flex-start;margin-top:.5rem">
        ${res.thumbnail ? `<img src="${esc(res.thumbnail)}" style="width:80px;border-radius:6px">` : ''}
        <div>
          <div style="font-weight:600;font-size:.9rem">${esc(res.title)}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${esc(res.channel)}</div>
          <div style="margin-top:.5rem;font-size:.82rem">${langBadge}</div>
        </div>
      </div>`;
    document.getElementById('addForm').style.display = '';
    document.getElementById('addToChannelBtn').style.display = '';
    document.getElementById('adapted-title').value = res.title;
    if (CHANNEL_LANG !== 'en') {
      fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(res.title) + '&langpair=en|' + CHANNEL_LANG)
        .then(r => r.json())
        .then(d => { if (d.responseData?.translatedText) document.getElementById('adapted-title').value = d.responseData.translatedText; })
        .catch(() => {});
    }
  }

  async function addToChannel() {
    if (!verifiedVideo) return;
    const adaptedTitle = document.getElementById('adapted-title').value.trim();
    const res = await fetch('/api/productions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        channel_id: CHANNEL_ID, source_url: verifiedVideo.url,
        source_video_id: verifiedVideo.video_id, source_title: verifiedVideo.title,
        source_channel: verifiedVideo.channel, source_language: verifiedVideo.language,
        source_thumbnail: verifiedVideo.thumbnail, adapted_title: adaptedTitle,
      }),
    }).then(r => r.json());
    if (res.success) {
      bootstrap.Modal.getInstance(document.getElementById('modalAddUrl')).hide();
      showToast('✅ Vídeo adicionado!', false);
      loadProductions();
    } else {
      showToast('❌ ' + (res.error || 'Erro'), true);
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function copyPanelText(areaId) {
    const el = document.getElementById(areaId);
    if (!el) return;
    navigator.clipboard.writeText(el.value).then(() => showToast('📋 Copiado!', false));
  }
  function savePanelText(areaId, filename) {
    const el = document.getElementById(areaId);
    if (!el || !el.value.trim()) return;
    const blob = new Blob([el.value], { type:'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename + '_' + Date.now() + '.txt';
    a.click();
  }
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', 4500);
  }

  loadProductions();
</script>
</body>
</html>
